query DiscussionCommentQuery(
    $discussionId: ID!,
    $after: String
)
{
    rateLimit {
        remaining
        resetAt
        used
        limit
    }

    node(id: $discussionId) {
        ... on Discussion {
            comments(first: 100, after: $after)
            {
                totalCount

                pageInfo {
                    endCursor
                    hasNextPage
                }

                edges {
                    node {
                        author {
                            ... on User {
                                login
                            }
                        }
                        authorAssociation
                        id
                        databaseId
                        isAnswer
                        body
                        createdAt
                        publishedAt
                        updatedAt
                        lastEditedAt
                    }
                }
            }
        }
    }
}
